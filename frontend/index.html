<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Kepadatan Jadwal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h2>Daily AI Schedule</h2>
        <div class="form-group">
            <input type="text" id="task" placeholder="Nama Kegiatan">
            <input type="number" id="dur" placeholder="Durasi (Jam)">
            <input type="date" id="date">
            <button onclick="save()">Simpan Kegiatan</button>
        </div>

        <div id="result">
            <h3>Status: <span id="status">-</span></h3>
            <p>Skala Fuzzy: <span id="score">0</span>/100</p>
        </div>

        <div style="width: 100%; max-width: 400px; margin: auto;"> 
            <canvas id="densityChart"></canvas> 
        </div> 
    </div>

    <script src="script.js"></script>
</body>
</html>
