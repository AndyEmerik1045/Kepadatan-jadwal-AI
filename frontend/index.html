<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Schedule — Daily Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="noise"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-dot"></span>
        <span>AISCHEDULE</span>
      </div>
      <div class="header-meta">
        <span id="today-label" class="today-label"></span>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- LEFT PANEL -->
    <section class="panel panel-left">
      <div class="panel-label">01 — TAMBAH AGENDA</div>

      <div class="form-group">
        <label for="task">NAMA KEGIATAN</label>
        <textarea id="task" placeholder="Contoh: Rapat Tim Alpha" autocomplete="off" rows="3"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dur">DURASI (JAM)</label>
          <input id="dur" type="number" placeholder="1–8" min="1" max="8">
        </div>
        <div class="form-group">
          <label for="date">TANGGAL</label>
          <input id="date" type="date">
        </div>
      </div>

      <button class="btn-save" onclick="save()">
        <span class="btn-text">SIMPAN AGENDA</span>
        <span class="btn-arrow">→</span>
      </button>

      <div id="toast" class="toast hidden"></div>

      <!-- STATS BOX -->
      <div class="stats-box">
        <div class="panel-label">02 — STATUS KEPADATAN</div>
        <div class="stat-row">
          <div class="stat-item">
            <div class="stat-label">STATUS</div>
            <div id="status" class="stat-value">—</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">TINGKAT KEPADATAN</div>
            <div id="score" class="stat-value mono">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">TOTAL AGENDA</div>
            <div id="total" class="stat-value mono">0</div>
          </div>
        </div>

        <div class="density-bar-wrap">
          <div class="density-bar-bg">
            <div id="density-bar" class="density-bar-fill" style="width:0%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- RIGHT PANEL -->
    <section class="panel panel-right">
      <div class="panel-label">03 — DAFTAR AGENDA</div>

      <div id="taskList" class="task-list"></div>

      <div class="panel-label chart-label">04 — GRAFIK MINGGUAN</div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </section>

  </main>

  <!-- EDIT MODAL -->
  <div id="editModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="panel-label" style="border:none;padding:0;margin:0;">EDIT AGENDA</span>
        <button class="modal-close" onclick="closeEdit()">✕</button>
      </div>
      <div class="form-group">
        <label for="editTask">NAMA KEGIATAN</label>
        <textarea id="editTask" rows="2" autocomplete="off"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="editDur">DURASI (JAM)</label>
          <input id="editDur" type="number" min="1" max="8" placeholder="1–8">
        </div>
        <div class="form-group">
          <label for="editDate">TANGGAL</label>
          <input id="editDate" type="date">
        </div>
      </div>
      <button class="btn-save" onclick="submitEdit()">
        <span class="btn-text">SIMPAN PERUBAHAN</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
